body:
  text: 金漳蘭譜卷下宋趙時庚撰奧法分種法分種蘭蕙須至九月節氣方可分栽十月節候花已胎孕不可分種若見雪霜大寒尤不可分栽否必損花栽花法花盆先以粗碗或粗碟覆之於盆底次用爐炭鋪一層然後却用肥泥薄鋪炭上使蘭栽根在土如根糝泥滿盆面上留一寸地栽時不可雙手將泥揑實則根不長其根不舒暢葉則不長花亦不結土有乾濕依時候用水澆灌安頓澆灌法春二三月無霜雪天放花盆在露天四向皆得水澆日晒不妨逢十分大雨恐墜其葉則以小繩束起葉如連雨三五日須移避暑通風處四月至八月須用疏眼竹籠籃遮護冀見日氣最要通風梅天忽逢急雨須移花盆放背日處若逢大雨又逢日晒盆內熱水則蕩害葉亦損根過雨時若枝上花蕊頭多候開次有未開一兩蕊頭便可剪去若留開盡則奪來年花信九月看花乾處用水澆灌若濕則不可澆或用肥水培灌一兩畨不妨冬十月十一月十二月正月不澆不妨最怕霜雪須用密籃遮護安頓朝陽有日照處在南窗簷下但是向陽處三兩日一畨施轉花盆四面俱要輪轉日晒均勻開花時則四畔皆有花若晒一面只一處有花澆花法用河水或陂塘水或積留雨水最好其次用溪澗水切不可用井水澆水須於四畔澆勻不可從上澆下恐壞其葉也四月若有梅雨不必澆若無雨時澆之五月至八月須是早起五更日未出澆一畨至晚黃昏澆一畨又要看花乾濕若濕則不必澆如十分濕恐爛壞其根種花肥泥法栽蘭用泥不管四時遇山上有火燒處取水流火燒浮泥尋蕨菜草燒灰和火燒之泥用或拾舊草鞋放在小糞中浸日久拌黃泥燒過黃灰却用大糞澆放在一壁儘數雨打日照三兩個月收起頓放間處栽花時用瑞香花種時用前項肥泥如栽蘭花一般安排盆內種只要泥鬆不可用實泥如栽花時將泥打鬆以十分為率八分用肥泥二分用沙泥拌之去除蟣蝨法肥水澆花必蟣蝨在葉底恐壞葉則損花如生此物研大蒜和水以白筆蘸水拂澆葉上乾淨去除蟣蝨雜法遇盆內泥將乾則用茶清水灌澆不拘時用須用河水或留下雨水切不可用井水四月有花至八月內交過九月節氣便可分花蘭之壯者有二三十箇花頭弱者只有五六箇花頭恐泥瘦分時種無盆內泥取出再加肥泥和勻入盆栽種魚鱗水亦肥須是浸得氣味過日久反清用尋常盆面泥乾併實則用竹箆挑剔泥鬆休要撥根動了葉紫紅色則是被霜打了須移於雨簷窗下背霜雪處安頓仍舊自青盆有竅孔不要著泥地安頓恐地濕蚯蚓鑽入盆內則損壞花又休要放盆在螞蟻穴處恐引入馬蟻則損花黃葉用茶清澆灌遇有黃葉處連根披去花盆要放在南邉架上安頓令風從底入為妙又免得蚯蚓馬蟻之患九月分花時用手劈開劈不開時用竹刀劈之休要損動了根分訖如法栽種金漳蘭譜卷下
  hash: sha256:335904dca1279a5675f72f7df1206e460d15cd8c0aaf2194cfd4df1de0b2c0ee

body:
  text: 金漳蘭譜卷中宋趙時庚撰堅性封植草木之生長亦猶人焉何則人亦天地之物耳閑居暇日優游逸豫飲膳得宜以蘭而言之具一盆盈滿自非六七載莫能至此皆由夫愛養之念不替灌溉之功愈久故根與土合性與壤俱然後森欝雄健敷暢繁麗其花葉盖有得於自然而然者合焉欲分而析之是裂其根荄易其沙土况或灌溉之失時愛養之乖宜又何異於人之飢飽則燥濕干之邪氣来間入其榮衛則不免有所侵損所謂向之寒暑適宜肥瘦得時者此豈一朝一夕之所能成也故必于寒露之後立冬以前而分之盖取萬物得歸根之時而其葉則蒼根則老故也或者於此時分一盆吳蘭欲其盆之端正則不忍擊碎因剔出而根已傷暨三年培植始能暢茂予今深以為戒欲分其蘭而須用碎其盆務在輕手擊之亦須緩緩解析其交互之根勿使有拔斷之失然後遂箆藂取出積年腐蘆頭只存三年者每三箆作一盆盆底先用沙填之即以三箆藂之互相枕藉使新箆在外作三方向却隨其花之好肥瘦沙土從而種之盆面則以少許瘦沙覆之以新汲水一勺定其根更有收沙晒之法此乃又分蘭之至要者當預于未分前半月取之篩去瓦礫之類曝令乾燥或欲適肥則宜淤泥沙可用便糞夹和惟晒之候乾或復濕如此十度視其極燥更須篩過隨意用盖沙乃久年流聚雖居氷濕之地而蘭之驟亦分析失性須假以陽物助之則来年藂箆自長與舊藂比肩此其效也夫茍不知收晒之宜用積渰之沙或憚披曝必至羸弱而黄葉者亦有之箆之不發者有之積有日月不知體察其失愈甚候其已蘇方始易沙滌根加意調䕶易其能復不亦後乎抑又知其果能復焉如其稍可前活有㡬何時而或遂本質邪故保為奈惜之因併為之言曰於其既損之後而欲復全生之寧若於未分之前而必欲全生之豈不省力今逐品所以宜沙土開列于後陳夢良以黄淨無泥瘦沙種而切忌肥恐有靡爛之失吳蘭潘蘭用赤沙泥何蘭青蒲統領大張金殿邉各用黄色麄沙和泥更添紫沙赤沙泥種為妙陳八尉淳監糧蕭仲和許景初何首座林仲孔莊觀成乃下品極意用妙濟老施花恵知容馬大同鄭少舉黄八兄周染宜溝壑中黒沙泥和糞壤種之李通判竈山朱蘭鄭伯善魚魫用山下流聚沙泥種夕陽紅以下諸品則任意栽種此封植之槩論灌溉得宜夫蘭自沙土出者各有品類然亦因其土地之宜而生長之故地有肥瘠或沙黄土赤而脊有居山之巔山之岡或近水或附石各依而産之要在度其本性何如耳不可謂其無肥瘦也茍性不能别曰何者當肥強出已見混而肥之則好髙腴者因得所養之天花則輕而繁葉則雄而健所謂好瘦者不因肥而腐敗者吾未之信也一陽生於子荄甲潜萌我則注而灌溉之使藴中者稍獲強壯迨夫萌芽迸沙髙未及寸許從便灌之則截然卓簮暨南薫之時長養萬物又從而漬潤之則修然而髙欝然而蒼若者精於感遇者也秋八月初交驕陽方熾根葉失水欲老而黄此時當以濯魚肉水或穢腐水澆之過時之外合用之物隨宜澆注使之暢茂亦以防秋風肅殺之患故其葉弱拳拳然抽出至冬而極夫人分蘭之次年不與發花者盖恐泄其氣則葉不長耳凡善於養花切意愛其葉葉聳則不慮其花之不繁盛也紫花陳夢良極難愛養稍肥隨即腐爛貴用清水澆灌則佳也潘蘭雖未能愛肥須以茶清沃之冀得其本地土之性吳花看来亦好種肥亦灌溉之一月一度趙花何花大張小張青蒲統領金殿邉半月一澆其肥則可焉陳八尉淳監糧蕭仲和許景初何首座林仲孔莊觀成縦有太過不及之失亦無大害於用肥之時當俟沙土乾燥遇晚方加灌溉候曉以清水碗許澆之使肥膩之物得以下漬其根使其新来未發之箆自無勾蔓送上散亂盤盆之患更能預以瓮罁之物蓄雨水積久色緑者間或進灌之而其葉則潑然挺秀濯然爭茂盈臺蔟檻列翠羅青縦無花開亦見雅潔白花濟老施花恵知容馬大同鄭少舉黄八兄周染愛肥一任灌溉李通判竈山鄭伯善肥在六之中四之下又朱蘭亦如之魚魫蘭質瑩潔不須過肥徐以穢膩物汁澆之夕陽紅雲嬌青蒲觀堂主名第弱卿肥瘦童亦當觀其土之燥晚則灌注曉則清水灌之欲儲蓄雨水令其色緑沃之為妙惠知容等蘭用渄沙簸去泥塵夹糞盖泥種底用麄沙和糞鄭少舉用糞盖泥和便晒乾種已上面用紅泥覆之竈山用糞壤泥及用河沙内草鞋屑鋪四圍種之累試甚佳大凡用輕鬆泥皆可濟老施花用糞泥用零小便糞澆濕攤晒用草鞋屑圍種又竈山用園泥下有糞澆濕泥種四圍用草鞋屑然後種之金漳蘭譜卷中

body:
  text: 金漳蘭譜譜録類三草木禽魚之屬提要臣等謹案金漳蘭譜三卷宋趙時庚撰時庚為宗室子其始末未詳以時字聫名推之蓋魏王廷美之九世孫也是書亦載於說郛中而佚其下卷此本三卷皆備獨為完帙其序述亦頗詳贍大抵與王貴學蘭譜相為出入若大張青蒲統領之類此書但列其名及華葉根莖而已王氏蘭譜則詳其得名之由曰大張青者張其姓讀書岩谷得之蒲統領者乃淳熙間蒲統領引兵逐冦至一所得之記載互相詳略亦足見著書之不𠞰說也首列紹定癸巳時庚自序未又有懶真子跋語考懶真子乃馬永卿别號永卿受業劉安世為北宋末人不應紹定時尚在殆别一人而號偶同耳乾隆五十一年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀金漳蘭譜原序豫先大夫朝議郎自南康解印還卜里居築茅引泉植竹因以為亭會宴乎其間得郡侯博士伯成名其亭曰篔簹世界又以其東架數椽自號趙翁書院回峰轉向依山疊石盡植花木藂雜其間繁隂之地環列蘭花掩映左右以為游憩養疴之地豫時尚少日在其中每見其花好之艷麗之狀清香之敻目不能捨手不能釋即詢其名默而識之是以酷愛之心殆幾成癖粵自嘉定改元以後又采數品髙出於向時所植者豫嘉而求之故盡得其花之容質無失封培愛養之法而品第之殆今三十年矣而未嘗與達者道暇日有朋友過豫會詩酒琴瑟之後倐然而問之豫則曰有是哉即縷縷為之詳言友曰吁亦開發後覺一端也豈豫一身可得而私有何不與諸人以廣其傳豫不得辭因列為三卷名曰金漳蘭譜欲以續前人牡丹荔枝譜之意余以是編紹定癸巳六月良日淡齊趙時庚謹書

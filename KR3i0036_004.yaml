body:
  text: 金漳蘭譜跋余嘗身安寂然一榻之中置事物之冗來紛至之外度極長篆香芬馥怡神默坐峰月一視不覺精神自恬然也種蘭之趣然之否乎淡齋趙時庚敬為三卷以俟知音余於循修嵗之暇窗前植蘭數盆蓋别觀其生意也每日一周旋其側撫之太息愛之太勤非徒悅目又且悅心怡神其茅葺其葉青青猶緑衣郎挺節獨立可敬可慕逮夫開也凝情瀼露萬態千妍薰風自來四坐芬郁豈非真蘭室乎豈非有國香乎親朋過訪遺以蘭譜豫按味再三盡得愛之養之之法因其譜想其人又豈非懷馨陽馥日乎時已卯嵗中和節望日懶真子李子謹跋

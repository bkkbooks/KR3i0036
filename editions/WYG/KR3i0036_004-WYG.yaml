body:
  text: 金漳蘭譜䟦余嘗身安寂然一榻之中置事物之冗來紛至之外度極長篆香芬馥怡神黙坐峰月一視不覺精神自恬然也種蘭之趣然之否乎澹齋趙時庚敬為三卷以俟知音余於循修嵗之暇窗前植蘭數盆盖别觀其生意也每日一周旋其側撫之太息愛之太勤非徒悦目又且悦心怡神其茅葺其葉青青猶緑衣郎挺節獨立可敬可慕迨夫開也凝情瀼露萬態千妍薫風自來四坐芬郁豈非真蘭室乎豈非有國香乎親朋過訪遺以蘭譜予按味再三盡得愛之養之之法因其譜想其人又豈非懐馨陽馥日乎時已夘嵗中和節望日嬾真子李子謹䟦

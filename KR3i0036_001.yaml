body:
  text: 金漳蘭譜卷上宋趙時庚撰敘蘭容質陳夢良色紫每幹十二萼花頭極大為衆花之冠至若朝暉微照曉露暗濕則灼然騰秀亭然露竒斂膚傍幹團圓心向婉媚綽約佇立凝思如不勝情花三片尾如席徹青葉三尺頗覺弱翠然而緑背雖似劒脊至尾稜則軟薄斜撒粒許帶緇最為難種故人稀得其真吳蘭色深紫有十五萼幹紫英紅得所養則岐而生至有二十萼花頭差大色映人目如翔鸞翥鳯千態萬狀葉則髙大剛毅徑節蒼然可愛潘花色深紫有十五萼幹紫圓匝齊整疏密得宜疏不露幹密不簇枝綽約作態窈窕逞姿真所謂艷中之艷花中之花也視之愈久愈見精神使人不能捨去花中近心所色如吳紫艷麗過於衆花葉則差小於吳峭直雄健衆莫能比其色特深或云仙霞乃潘氏西山於仙霞嶺得之故人更以為名趙十四色紫有十五萼初萌甚紅開時若晚霞燦日色更晶明葉深紅合於沙土則徑直肥聳超出羣品亦云趙師傳蓋其名色何蘭紫色中紅有十四萼花頭倒壓亦不甚緑品外之竒金殿邉色深紫有十二萼出於長泰陳家色如吳花片則差小幹亦如之葉亦徑健所可貴者葉自尖處分二邉各一線許直下至葉中處色映日如金線其家寶之猶未廣也白蘭濟老色白有十二萼標致不凡如淡粧西子素裳縞衣不染一塵葉與施花近似更能髙一二寸得所養致岐而生亦號一線紅竈山有十二萼色碧玉花枝開體膚鬆美顒顒昻昂雅特間麗真蘭中之魁品也每生並蒂花幹最碧葉緑而瘦薄開花生子蒂如苦蕒菜葉相似呼為緑衣郎黃郎亦號為碧玉幹施花色微黃有十五萼合並幹而生計二十五萼或迸於根美則美矣每根有萎葉朵朵不暇細葉最緑微厚花頭似開不開幹雖髙而實貴瘦葉雖徑而實貴柔亦花中之上品也李通判色白十五萼峭特雅淡迎風浥露如泣如訴人愛之比類鄭花則減頭低葉小絶佳劒脊最長真花中之上品也惜乎不甚徑直惠知容色白有十五萼賦質清癯團蔟齊整或向或背嬌于瘦困花英淡紫片色尾凝黃葉雖緑茂細而覩之但亦柔弱馬大同色碧而緑有十二萼花頭微大開有上向者中多紅暈葉則髙聳蒼然肥厚花幹徑直及其葉之低亦名五暈絲上品之下鄭少舉色白有十四萼瑩然孤潔極為可愛葉則修長而瘦散亂所謂蓬頭少舉也亦有數種只是花有多少葉有軟硬之别白花中能生者無出於花其花之色姿質可愛為百花之翹楚者黃八兄色白有十二萼善於抽幹頗似鄭花惜乎幹弱不能支持葉緑而直周染花色白十二萼與鄭花無異等餘短弱耳夕陽紅花八萼花片凝火色則凝紅夕陽返照於物觀堂主花白有七萼花聚如蔟葉不甚髙可供婦人曉粧名弟色白有五六萼花似鄭葉最柔軟如新長葉則舊葉隨換人多不種青蒲色白有七萼挺肩露骨甚類竈山而花潔白葉小而直且緑只髙尺五六寸弱腳只是獨頭蘭色緑花大如鷹爪一幹一花髙二三寸葉瘦長二三尺入臘方花薰馥可愛而香有餘魚魫蘭十二萼花片澄徹宛如魚魫采而沈之水中無影可指葉則頗徑色緑此白蘭之竒品也品蘭髙下余嘗謂天下凡幾山川而其支派源委與夫人迹所不至之地其間山坳石罅斜谷幽竇又不知其幾何嵗遇古之修竹矗空之危木靈種覆濩溪澗盤旋森羅蔽道暉陽不燭泠然泉聲磊乎萬狀隨地之異則所産之多人賤之蔑如也倐然經乎樵牧之手而見駭然識者從而得之則必攜持登髙岡涉長途欣然不憚其勞中心之所好者何邪不能以售販而置之也其他近城百里淺小去處亦有數品可服何必求諸深山窮谷每論及此往往啓識者雖有不韙之謂毋亦地邇而氣殊葉萎而花蠧或不能得培植之三昧者耶是故花有深紫有淺紫有深紅有淺紅與夫黃白緑碧魚魫金鏤邉等品是必各因其地氣之所鍾而然意亦隨其本質而産之歟抑其皇穹儲精景星慶雲垂光遇物而流形者也噫萬物之殊亦天地造化施生之功豈豫可得而輕哉竊嘗私合品第而類之以為花有多寡葉有強弱此固因其所賦而然也茍惟人力不知則多者從而寡之強者又從而弱之使夫人何以知其蘭之髙下其不誤人者幾希嗚呼蘭不能自異而人異之耳故必執一定之見物品藻之則有炎然之性在况人均一心心均一見眼力所至非可語也故紫花以陳夢為甲吳潘為上品中品則趙十四何蘭大張青蒲統領陳八尉淳監糧下品則許景初石門紅小張蕭仲和何首座林仲孔莊觀城外則金殿邉為紫花竒品之冠也白花則濟老竈山施花李通判惠知容馬大同為上品所為鄭少舉黃八兄周染為次下品夕陽紅雲矯朱花觀堂主青蒲名第弱卿王小娘者也趙花又為品外之竒天地愛養天不言而四時行百物生蓋嵗分四時生六氣合四時而言之則二十四氣以成其嵗功故凡盈穹壤者皆物也不以草木之微昆蟲之細而必欲各遂其性者則在乎人因其氣候以生全之者也彼動植者非其物乎及草木者非其人乎斧斤以時入山林數罟不入汙池又非其能全之者乎夫春為青帝回馭陽氣風和日暖蟄雷一震而土脈融暢萬彚藂生其氣則有不可得而掩者是以聖人之人則順天地以養萬物必欲使萬物得遂其本性而後已故為臺太髙則揰陽太低則隱風前宜面南後宜背北蓋欲通南薰而障北吹也地不必曠曠則有日亦不必狹狹則蔽氣右宜近林左宜近野欲引東日而避西陽夏遇炎熱則蔭之冬逢沍寒則曝之下沙欲疏疏則連雨不能淫上沙欲濡濡則酷日不能燥至於插引葉之架平護根之沙防蚯蚓之傷禁螻蟻之穴去其莠草除其細蟲助其新箆剪其敗葉此則愛養之法也其餘一切窠蟲族類皆能蠧花並可除之所以封植灌溉之法詳載於後卷金漳蘭譜卷上
